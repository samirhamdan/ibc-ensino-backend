<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBC Ensino — Plataforma EAD</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#006a7f;--navy-light:#008ea8;--gold:#008ea8;--gold-light:#33adc0;
    --cream:#f9f6f0;--cream2:#f0ebe0;--text:#1a1a2e;--muted:#6b7280;
    --success:#2d6a4f;--success-bg:#d8f3dc;--danger:#c0392b;--danger-bg:#fde8e8;
    --radius:10px;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
  .screen{display:none;min-height:100vh;animation:fadeIn .35s ease}
  .screen.active{display:flex}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* LOGIN */
  #screen-login{flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#004d5e 0%,#006a7f 50%,#008ea8 100%);padding:2rem}
  .login-card{background:white;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .login-logo{text-align:center;margin-bottom:1.8rem}
  .login-logo .cross{font-size:2.2rem;color:var(--gold)}
  .login-logo h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);line-height:1.2;margin-top:.3rem}
  .login-logo p{font-size:.8rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:.2rem}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--navy);margin-bottom:.35rem;letter-spacing:.03em}
  .field input{width:100%;padding:.65rem .9rem;border:1.5px solid #dde;border-radius:var(--radius);font-family:inherit;font-size:.9rem;color:var(--text);background:#fafafa;transition:border .2s}
  .field input:focus{outline:none;border-color:var(--navy);background:white}
  .btn-primary{width:100%;padding:.75rem;background:var(--navy);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .2s,transform .1s}
  .btn-primary:hover{background:var(--navy-light)}
  .btn-primary:active{transform:scale(.98)}
  .login-error{font-size:.82rem;color:var(--danger);text-align:center;margin-top:.6rem;min-height:1.2rem}

  /* MAIN */
  #screen-main{flex-direction:column;min-height:100vh}
  .topbar{background:var(--navy);color:white;padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:.7rem}
  .topbar-cross{color:var(--gold);font-size:1.3rem}
  .topbar-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600}
  .topbar-subtitle{font-size:.7rem;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase}
  .topbar-user{display:flex;align-items:center;gap:.6rem}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem}
  .btn-logout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:.3rem .7rem;border-radius:6px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn-logout:hover{background:rgba(255,255,255,.1);color:white}
  .main-body{display:flex;flex:1}
  .sidebar{width:230px;background:white;border-right:1px solid #e8e0d4;padding:1rem .75rem;flex-shrink:0;overflow-y:auto}
  .sidebar-section{margin-bottom:1.2rem}
  .sidebar-label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:.3rem .5rem;margin-bottom:.3rem}
  .course-item{padding:.55rem .7rem;border-radius:8px;cursor:pointer;margin-bottom:.15rem;transition:background .15s;display:flex;align-items:center;gap:.5rem}
  .course-item:hover{background:var(--cream2)}
  .course-item.active{background:var(--navy);color:white}
  .course-item.active .ci-icon{color:var(--gold)}
  .ci-icon{font-size:.9rem;flex-shrink:0}
  .ci-text{flex:1;min-width:0}
  .ci-name{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci-progress{font-size:.7rem;opacity:.65;margin-top:.1rem}
  .mini-bar{height:3px;background:#e8e0d4;border-radius:2px;margin-top:.3rem}
  .mini-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
  .course-item.active .mini-bar{background:rgba(255,255,255,.2)}
  .course-item.active .mini-bar-fill{background:var(--gold-light)}
  .content{flex:1;padding:1.5rem;overflow-y:auto;max-width:860px}

  /* COURSE */
  .course-header{margin-bottom:1.5rem}
  .course-tag{display:inline-block;background:var(--navy);color:var(--gold);font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.25rem .7rem;border-radius:20px;margin-bottom:.6rem}
  .course-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy);margin-bottom:.4rem}
  .course-meta{font-size:.8rem;color:var(--muted);display:flex;gap:1rem;flex-wrap:wrap}
  .progress-section{background:white;border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1.2rem;border:1px solid #e8e0d4}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
  .progress-label{font-size:.8rem;font-weight:600;color:var(--navy)}
  .progress-pct{font-size:.8rem;color:var(--gold);font-weight:700}
  .progress-bar{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .progress-steps{display:flex;gap:.5rem;margin-top:.6rem}
  .step-dot{width:10px;height:10px;border-radius:50%;background:#e8e0d4;transition:background .3s}
  .step-dot.done{background:var(--gold)}
  .step-dot.current{background:var(--navy);box-shadow:0 0 0 2px var(--navy-light)}
  .tabs{display:flex;gap:0;margin-bottom:1.2rem;background:white;border-radius:var(--radius);border:1px solid #e8e0d4;overflow:hidden}
  .tab{flex:1;padding:.6rem;text-align:center;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:none;font-family:inherit}
  .tab.active{background:var(--navy);color:white}
  .tab:hover:not(.active){background:var(--cream2)}

  /* PDF */
  .pdf-section{background:white;border-radius:var(--radius);border:1px solid #e8e0d4;overflow:hidden}
  .pdf-toolbar{background:var(--cream2);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e0d4}
  .pdf-toolbar-left{display:flex;align-items:center;gap:.5rem}
  .pdf-filename{font-size:.82rem;font-weight:600;color:var(--navy)}
  .pdf-badge{font-size:.65rem;background:var(--navy);color:var(--gold);padding:.15rem .5rem;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .pdf-viewer-frame{width:100%;height:500px;border:none;display:block}
  .pdf-list{padding:.5rem}
  .pdf-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .8rem;border-radius:8px;cursor:pointer;transition:background .15s;border:1px solid transparent}
  .pdf-item:hover{background:var(--cream);border-color:#e8e0d4}
  .pdf-item.viewing{background:var(--navy);color:white}
  .pdf-item.viewing .pdf-item-meta{color:rgba(255,255,255,.6)}
  .pdf-item-icon{font-size:1.2rem;flex-shrink:0}
  .pdf-item-name{font-size:.85rem;font-weight:500;flex:1}
  .pdf-item-meta{font-size:.72rem;color:var(--muted)}
  .btn-view{background:var(--gold);color:var(--navy);border:none;padding:.3rem .7rem;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit}
  .pdf-no-files{padding:2rem;text-align:center;color:var(--muted);font-size:.85rem}

  /* QUIZ */
  .quiz-wrap{background:white;border-radius:var(--radius);border:1px solid #e8e0d4;overflow:hidden}
  .quiz-header{background:var(--navy);padding:1rem 1.2rem;color:white}
  .quiz-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold-light)}
  .quiz-desc{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:.2rem}
  .quiz-body{padding:1.2rem}
  .question-card{margin-bottom:1.3rem;padding:1rem 1.1rem;border-radius:8px;background:var(--cream);border:1px solid #e8e0d4;transition:border .2s}
  .question-card.correct{border-color:#2d6a4f;background:#f0fff4}
  .question-card.wrong{border-color:var(--danger);background:#fff5f5}
  .q-num{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
  .q-text{font-size:.9rem;font-weight:500;color:var(--navy);margin-bottom:.8rem;line-height:1.5}
  .options{display:flex;flex-direction:column;gap:.4rem}
  .option{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-radius:7px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-size:.85rem;background:white}
  .option:hover{border-color:var(--navy);background:var(--cream)}
  .option input[type=radio]{accent-color:var(--navy);flex-shrink:0}
  .option.selected{border-color:var(--navy);background:#e8edf7}
  .option.correct-ans{border-color:#2d6a4f;background:#d8f3dc;color:#1b4332}
  .option.wrong-ans{border-color:var(--danger);background:#fde8e8;color:#7b1818}
  .q-feedback{font-size:.78rem;margin-top:.6rem;padding:.4rem .7rem;border-radius:5px;font-weight:500}
  .q-feedback.ok{background:var(--success-bg);color:var(--success)}
  .q-feedback.err{background:var(--danger-bg);color:var(--danger)}
  .quiz-actions{display:flex;justify-content:flex-end;gap:.7rem;padding-top:.5rem}
  .btn-secondary{padding:.6rem 1.2rem;background:white;color:var(--navy);border:1.5px solid var(--navy);border-radius:var(--radius);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
  .btn-secondary:hover{background:var(--cream)}
  .btn-gold{padding:.6rem 1.4rem;background:var(--gold);color:var(--navy);border:none;border-radius:var(--radius);font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
  .btn-gold:hover{background:var(--gold-light)}
  .quiz-result{text-align:center;padding:2rem 1rem}
  .result-score{font-size:3rem;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif}
  .result-label{font-size:.9rem;color:var(--muted);margin-top:.3rem}
  .result-msg{margin-top:1rem;font-size:.95rem;font-weight:500;padding:.6rem 1rem;border-radius:8px;display:inline-block}
  .result-msg.pass{background:var(--success-bg);color:var(--success)}
  .result-msg.fail{background:var(--danger-bg);color:var(--danger)}

  /* ADMIN */
  .admin-section{background:white;border-radius:var(--radius);border:1px solid #e8e0d4;margin-bottom:1rem;overflow:hidden}
  .admin-section-header{background:var(--cream2);padding:.7rem 1rem;font-size:.8rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8e0d4}
  .admin-section-body{padding:1rem}
  .form-row{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:.8rem}
  .form-group{flex:1;min-width:160px}
  .form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--navy);margin-bottom:.3rem}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:.55rem .8rem;border:1.5px solid #dde;border-radius:8px;font-family:inherit;font-size:.85rem;color:var(--text);background:#fafafa}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--navy)}
  .form-group textarea{resize:vertical;min-height:60px}
  .table-users{width:100%;font-size:.82rem;border-collapse:collapse}
  .table-users th{text-align:left;padding:.5rem .7rem;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e8e0d4}
  .table-users td{padding:.55rem .7rem;border-bottom:1px solid #f0ebe0}
  .table-users tr:last-child td{border-bottom:none}
  .badge-role{font-size:.65rem;padding:.2rem .5rem;border-radius:4px;font-weight:700;text-transform:uppercase}
  .badge-admin{background:#e8edf7;color:var(--navy)}
  .badge-aluno{background:var(--success-bg);color:var(--success)}
  .btn-sm{padding:.3rem .65rem;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit}
  .btn-danger-sm{background:#fff5f5;color:var(--danger);border-color:#f7c6c6}
  .btn-danger-sm:hover{background:var(--danger-bg)}


  /* DASHBOARD */
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.9rem;margin-bottom:1.5rem}
  .dash-card{background:white;border-radius:var(--radius);padding:1.1rem 1rem;border:1px solid #e8e0d4;display:flex;flex-direction:column;gap:.3rem}
  .dash-card-icon{font-size:1.4rem}
  .dash-card-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);line-height:1}
  .dash-card-label{font-size:.75rem;color:var(--muted);font-weight:500}
  .dash-card.highlight{background:var(--navy);border-color:var(--navy)}
  .dash-card.highlight .dash-card-value{color:white}
  .dash-card.highlight .dash-card-label{color:rgba(255,255,255,.65)}

  /* CATÁLOGO */
  .catalog-filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
  .cat-filter{padding:.3rem .85rem;border-radius:20px;border:1.5px solid #e8e0d4;background:white;color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s}
  .cat-filter.active,.cat-filter:hover{background:var(--navy);color:white;border-color:var(--navy)}
  .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
  .course-card{background:white;border-radius:var(--radius);border:1px solid #e8e0d4;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
  .course-card:hover{box-shadow:0 6px 24px rgba(0,106,127,.12);transform:translateY(-2px)}
  .course-card-banner{height:80px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,#004d5e,#008ea8)}
  .course-card-body{padding:.8rem}
  .course-card-tag{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--navy-light);margin-bottom:.3rem}
  .course-card-name{font-size:.9rem;font-weight:600;color:var(--navy);margin-bottom:.5rem;line-height:1.3}
  .course-card-meta{font-size:.72rem;color:var(--muted);display:flex;gap:.7rem}
  .course-card-progress{margin-top:.6rem}
  .cc-bar{height:4px;background:var(--cream2);border-radius:2px;overflow:hidden}
  .cc-bar-fill{height:100%;background:var(--navy-light);border-radius:2px;transition:width .4s}
  .cc-pct{font-size:.68rem;color:var(--muted);margin-top:.25rem}
  .badge-cat{display:inline-block;font-size:.65rem;padding:.2rem .55rem;border-radius:4px;font-weight:600;background:#e8f4f6;color:var(--navy)}

  /* CATEGORIAS */
  .cat-list{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}
  .cat-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .7rem;border-radius:20px;background:#e8f4f6;color:var(--navy);font-size:.78rem;font-weight:500}
  .cat-chip button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem;line-height:1;padding:0;margin-left:.1rem}
  .cat-chip button:hover{color:var(--danger)}

  /* ── COURSE TABS EXPANDIDOS ── */
  .tabs-5{display:flex;gap:0;margin-bottom:1.2rem;background:white;border-radius:var(--radius);border:1px solid #e8e0d4;overflow:hidden;flex-wrap:wrap}
  .tabs-5 .tab{flex:1;min-width:80px;padding:.55rem .4rem;font-size:.75rem}

  /* ── RESUMO ── */
  .resumo-box{background:white;border-radius:var(--radius);border:1px solid #e8e0d4;padding:1.1rem 1.2rem;margin-bottom:1rem}
  .resumo-desc{font-size:.88rem;color:var(--text);line-height:1.65;margin-bottom:1rem}
  .resumo-stats{display:flex;gap:.8rem;flex-wrap:wrap}
  .resumo-stat{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted);background:var(--cream);padding:.4rem .75rem;border-radius:6px}
  .resumo-stat strong{color:var(--navy)}

  /* ── MÓDULOS ── */
  .modulo-list{display:flex;flex-direction:column;gap:.5rem}
  .modulo-item{background:white;border:1px solid #e8e0d4;border-radius:8px;padding:.65rem .9rem;display:flex;align-items:center;gap:.7rem}
  .modulo-num{width:24px;height:24px;border-radius:50%;background:var(--navy);color:white;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
  .modulo-name{font-size:.85rem;font-weight:500;color:var(--navy);flex:1}
  .modulo-dur{font-size:.72rem;color:var(--muted)}

  /* ── MATERIAIS ── */
  .material-list{display:flex;flex-direction:column;gap:.5rem}
  .material-item{background:white;border:1px solid #e8e0d4;border-radius:8px;padding:.6rem .9rem;display:flex;align-items:center;gap:.7rem;transition:background .15s}
  .material-item:hover{background:var(--cream)}
  .mat-icon{font-size:1.2rem;flex-shrink:0}
  .mat-info{flex:1;min-width:0}
  .mat-name{font-size:.85rem;font-weight:500;color:var(--navy)}
  .mat-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem}
  .mat-type{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.15rem .45rem;border-radius:3px}
  .mat-pdf{background:#fde8e8;color:#a00}
  .mat-link{background:#e8f4f6;color:var(--navy)}
  .mat-viewing{background:var(--navy);color:white}
  .mat-viewing .mat-name,.mat-viewing .mat-meta{color:rgba(255,255,255,.85)}

  /* ── PERGUNTAS AO TUTOR ── */
  .pergunta-list{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1rem}
  .pergunta-card{background:white;border:1px solid #e8e0d4;border-radius:8px;overflow:hidden}
  .pergunta-header{padding:.65rem .9rem;display:flex;align-items:flex-start;gap:.6rem}
  .pergunta-avatar{width:28px;height:28px;border-radius:50%;background:var(--navy);color:white;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
  .pergunta-meta{flex:1}
  .pergunta-autor{font-size:.78rem;font-weight:600;color:var(--navy)}
  .pergunta-data{font-size:.68rem;color:var(--muted)}
  .pergunta-texto{font-size:.85rem;color:var(--text);line-height:1.5;padding:.1rem 0 .6rem 2.5rem}
  .resposta-area{background:var(--cream2);border-top:1px solid #e8e0d4;padding:.7rem .9rem;display:flex;align-items:flex-start;gap:.6rem}
  .resposta-avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:.15rem}
  .resposta-texto{font-size:.82rem;color:var(--text);flex:1;line-height:1.5}
  .resposta-form{background:var(--cream2);border-top:1px solid #e8e0d4;padding:.7rem .9rem}
  .resposta-form textarea{width:100%;padding:.5rem .7rem;border:1.5px solid #dde;border-radius:7px;font-family:inherit;font-size:.82rem;resize:vertical;min-height:56px;background:white}
  .resposta-form textarea:focus{outline:none;border-color:var(--navy)}
  .badge-respondida{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:.15rem .5rem;border-radius:4px;background:var(--success-bg);color:var(--success)}
  .badge-pendente{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:.15rem .5rem;border-radius:4px;background:#fff3cd;color:#856404}

  /* ── ADMIN MATERIAL FORM ── */
  .mat-type-toggle{display:flex;gap:0;border:1.5px solid #dde;border-radius:8px;overflow:hidden;margin-bottom:.8rem}
  .mat-type-btn{flex:1;padding:.45rem;text-align:center;font-size:.8rem;font-weight:500;cursor:pointer;border:none;background:#fafafa;font-family:inherit;color:var(--muted);transition:all .15s}
  .mat-type-btn.active{background:var(--navy);color:white}
  @media(max-width:600px){
    .sidebar{width:100%;border-right:none;border-bottom:1px solid #e8e0d4}
    .main-body{flex-direction:column}
  }
</style>
</head>
<body>

  // externo vê só públicos
  return courses.filter(c=>c.acesso==='publico'||!c.acesso);
}

function isAdmin(u){ return (u||currentUser).role==='admin'; }
function isTutor(u){ return (u||currentUser).role==='tutor'; }
function isAlunoInterno(u){ return (u||currentUser).role==='aluno-interno'; }
function isAlunoExterno(u){ return (u||currentUser).role==='aluno-externo'; }
function isAluno(u){ const r=(u||currentUser).role; return r==='aluno-interno'||r==='aluno-externo'||r==='aluno'; }
function canManageCourse(u,cid){
  u=u||currentUser;
  if(isAdmin(u)) return true;
  if(isTutor(u)) return (u.cursos||[]).includes(cid);
  return false;
}
function canEditContent(cid){ return canManageCourse(currentUser,cid); }

    'aluno-externo': {cls:'badge-aluno-externo', label:'Aluno Externo'},
    'aluno':     {cls:'badge-aluno',     label:'Aluno'},
  };
  const r=map[role]||{cls:'badge-aluno',label:role};
  return '<span class="badge-role '+r.cls+'">'+r.label+'</span>';
}

}

function getCourseProgress(cid){
  const key=`${currentUser.id}_${cid}`;
  const p=progress[key]||{};
  let done=0;
  if(p.materialDone)done++;
  if(p.quizScore!==undefined)done++;
  return Math.round((done/2)*100);
}

function renderCourseList(){
  const el=document.getElementById('course-list');
  el.innerHTML='';
  cursosVisiveis().forEach(c=>{
    const pct=getCourseProgress(c.id);
    const div=document.createElement('div');
    div.className='course-item'+(currentCourse&&currentCourse.id===c.id?' active':'');
    div.id='course-nav-'+c.id;
    div.innerHTML=`<span class="ci-icon">${c.icon||'📚'}</span>
      <div class="ci-text">
        <div class="ci-name">${c.name}</div>
        <div class="ci-progress">${pct}% concluído</div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    div.onclick=()=>selectCourse(c.id);

  });
}

function selectCourse(id){
  currentCourse=courses.find(c=>c.id===id);

function setTab(tab){
  activeTab=tab;
  ['resumo','modulos','material','quiz','perguntas'].forEach(t=>{
    const btn=document.getElementById('tab-btn-'+t);
    if(btn)btn.classList.toggle('active',t===tab);
  });
  renderTabContent();
}

function renderTabContent(){
  const el=document.getElementById('tab-content');
  if(!el)return;
  if(activeTab==='resumo') el.innerHTML=renderResumo();
  else if(activeTab==='modulos') el.innerHTML=renderModulos();
  else if(activeTab==='material') el.innerHTML=renderMaterial();
  else if(activeTab==='quiz') el.innerHTML=renderQuiz();
  else if(activeTab==='perguntas') el.innerHTML=renderPerguntas();
}

function renderMaterial(){
  const c=currentCourse;
  const key=`${currentUser.id}_${c.id}`;
  const p=progress[key]||{};
  const mats=c.materiais||c.pdfs||[];

  const matItems=mats.map((m,i)=>{
    const isLink=m.tipo==='link';
    const isViewing=viewingPDF===i;
    let actions='';
    if(isLink){
      actions=`<a href="${m.url}" target="_blank" class="btn-view" style="text-decoration:none">Abrir</a>`;
    } else if(m.url){
      actions=`<button class="btn-view" onclick="event.stopPropagation();viewPDF(${i})">Ver</button>`;
    }
    return `<div class="material-item ${isViewing?'mat-viewing':''}" onclick="${isLink?'':('viewPDF('+i+')')}">
      <span class="mat-icon">${isLink?'🔗':'📄'}</span>
      <div class="mat-info">
        <div class="mat-name">${m.name}</div>
        <div class="mat-meta">${isLink?m.url:(m.size||'—')}</div>
      </div>
      <span class="mat-type ${isLink?'mat-link':'mat-pdf'}">${isLink?'LINK':'PDF'}</span>
      ${actions}
    </div>`;
  }).join('');

  const adminForm=canEditContent(c.id)?`
    <div class="admin-section" style="margin-top:1rem">
      <div class="admin-section-header">➕ Adicionar Material</div>
      <div class="admin-section-body">
        <div class="mat-type-toggle">
          <button class="mat-type-btn active" id="mtype-pdf" onclick="toggleMatType('pdf')">📄 PDF</button>
          <button class="mat-type-btn" id="mtype-link" onclick="toggleMatType('link')">🔗 Link</button>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Nome / título</label>
            <input type="text" id="mat-name-input" placeholder="Ex: Apostila Módulo 1">
          </div>
        </div>
        <div id="mat-pdf-area">
          <input type="file" id="pdf-file-input" accept=".pdf" style="margin-bottom:.8rem;width:100%;font-size:.82rem">
        </div>
        <div id="mat-link-area" style="display:none">
          <div class="form-group"><label>URL</label>
            <input type="url" id="mat-link-input" placeholder="https://...">
          </div>
        </div>
        <button class="btn-gold" onclick="addMaterial()">Adicionar material</button>
      </div>
    </div>`:'';

  const viewerHtml=viewingPDF!==null&&mats[viewingPDF]&&mats[viewingPDF].url&&mats[viewingPDF].tipo!=='link'?`
    <div class="pdf-section" style="margin-bottom:1rem">
      <div class="pdf-toolbar">
        <div class="pdf-toolbar-left">
          <span class="pdf-badge">PDF</span>
          <span class="pdf-filename">${mats[viewingPDF].name}</span>
        </div>
        <button class="btn-sm" style="border-color:#dde;background:#f5f5f5;color:var(--text)" onclick="viewingPDF=null;renderTabContent()">✕ Fechar</button>
      </div>
      <iframe class="pdf-viewer-frame" src="${mats[viewingPDF].url}"></iframe>
    </div>`:'';

  const markBtn=!p.materialDone
    ?`<button class="btn-gold" style="margin-top:1rem" onclick="markMaterialDone(${c.id})">✓ Marcar material como concluído</button>`
    :`<div style="color:var(--success);font-weight:600;font-size:.85rem;margin-top:.8rem">✓ Material concluído!</div>`;

  return viewerHtml
    +`<div class="pdf-section">
      <div class="pdf-toolbar">
        <div class="pdf-toolbar-left">
          <span class="pdf-badge">MATERIAL</span>
          <span class="pdf-filename">${mats.length} item(ns)</span>
        </div>
      </div>
      ${mats.length?'<div class="material-list" style="padding:.5rem">'+matItems+'</div>':'<div class="pdf-no-files">Nenhum material adicionado ainda.</div>'}
    </div>`
    +adminForm+markBtn;
}
function viewPDF(i){viewingPDF=viewingPDF===i?null:i;renderTabContent();}

let currentMatType='pdf';
function toggleMatType(t){
  currentMatType=t;
  document.getElementById('mtype-pdf').classList.toggle('active',t==='pdf');
  document.getElementById('mtype-link').classList.toggle('active',t==='link');
  document.getElementById('mat-pdf-area').style.display=t==='pdf'?'block':'none';
  document.getElementById('mat-link-area').style.display=t==='link'?'block':'none';
}
function addMaterial(){
  const name=document.getElementById('mat-name-input').value.trim();
  if(!name){alert('Informe um nome.');return;}
  if(!currentCourse.materiais) currentCourse.materiais=[];
  if(currentMatType==='link'){
    const url=document.getElementById('mat-link-input').value.trim();
    if(!url){alert('Informe a URL.');return;}
    currentCourse.materiais.push({name,url,tipo:'link'});
  } else {
    const fileEl=document.getElementById('pdf-file-input');
    const file=fileEl.files[0];
    if(!file){alert('Selecione um arquivo PDF.');return;}
    const url=URL.createObjectURL(file);
    const size=(file.size/1024/1024).toFixed(1)+' MB';
    currentCourse.materiais.push({name,url,size,tipo:'pdf'});
    fileEl.value='';
  }
  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();
  document.getElementById('mat-name-input').value='';
  if(document.getElementById('mat-link-input')) document.getElementById('mat-link-input').value='';
  renderTabContent();
}

function markMaterialDone(cid){
  const key=`${currentUser.id}_${cid}`;
  if(!progress[key])progress[key]={};
  progress[key].materialDone=true;
  save();renderCourseList();renderCourse();setTab('material');
}

function renderQuiz(){
  const c=currentCourse;
  const key=`${currentUser.id}_${c.id}`;
  const p=progress[key]||{};
  if(quizSubmitted||p.quizScore!==undefined){
    const score=quizSubmitted?calcScore():p.quizScore;
    const total=c.quiz.length;
    const pct=Math.round((score/total)*100);
    const pass=pct>=60;
    const reviewHtml=c.quiz.map((q,i)=>{
      const chosen=quizAnswers[i];
      const correct=q.ans;
      const isRight=chosen===correct;
      return `<div class="question-card ${isRight?'correct':'wrong'}">
        <div class="q-num">Questão ${i+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.opts.map((o,j)=>`<div class="option ${j===correct?'correct-ans':(chosen===j&&!isRight?'wrong-ans':'')}">
            <input type="radio" disabled ${chosen===j?'checked':''}><span>${o}</span>
          </div>`).join('')}
        </div>
        <div class="q-feedback ${isRight?'ok':'err'}">${isRight?'✓ Correto!':'✗ Incorreto — '+q.exp}</div>
      </div>`;
    }).join('');
    return `<div class="quiz-wrap">
      <div class="quiz-header"><div class="quiz-title">Resultado</div><div class="quiz-desc">${c.name}</div></div>
      <div class="quiz-body">
        <div class="quiz-result">
          <div class="result-score">${score}/${total}</div>
          <div class="result-label">${pct}% de aproveitamento</div>
          <div class="result-msg ${pass?'pass':'fail'}">${pass?'🎉 Parabéns! Você passou!':'📚 Continue estudando e tente novamente!'}</div>
        </div>
        <hr style="border:none;border-top:1px solid #e8e0d4;margin:1rem 0">
        ${reviewHtml}
        <div class="quiz-actions"><button class="btn-secondary" onclick="retakeQuiz()">Tentar novamente</button></div>
      </div>
    </div>`;
  }
  const questionsHtml=c.quiz.map((q,i)=>`
    <div class="question-card" id="qcard-${i}">
      <div class="q-num">Questão ${i+1} de ${c.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,j)=>`<div class="option ${quizAnswers[i]===j?'selected':''}" onclick="selectOpt(${i},${j})">
          <input type="radio" name="q${i}" ${quizAnswers[i]===j?'checked':''} readonly><span>${o}</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
  return `<div class="quiz-wrap">
    <div class="quiz-header"><div class="quiz-title">Exercícios — ${c.name}</div><div class="quiz-desc">${c.quiz.length} questões · Mínimo 60% para aprovação</div></div>
    <div class="quiz-body">${questionsHtml}
      <div class="quiz-actions"><button class="btn-gold" onclick="submitQuiz()">Enviar respostas →</button></div>
    </div>
  </div>`;
}

function selectOpt(qi,oi){
  quizAnswers[qi]=oi;
  document.querySelectorAll(`#qcard-${qi} .option`).forEach((o,j)=>{
    o.classList.toggle('selected',j===oi);
    o.querySelector('input').checked=(j===oi);
  });
}
function calcScore(){return currentCourse.quiz.filter((q,i)=>quizAnswers[i]===q.ans).length;}
function submitQuiz(){
  if(Object.keys(quizAnswers).length<currentCourse.quiz.length){alert('Responda todas as questões antes de enviar.');return;}
  quizSubmitted=true;
  const score=calcScore();
  const key=`${currentUser.id}_${currentCourse.id}`;
  if(!progress[key])progress[key]={};
  if(progress[key].quizScore===undefined||score>progress[key].quizScore)progress[key].quizScore=score;
  save();renderCourse();setTab('quiz');
}
function retakeQuiz(){
  quizAnswers={};quizSubmitted=false;
  const key=`${currentUser.id}_${currentCourse.id}`;
  if(progress[key])delete progress[key].quizScore;
  save();renderTabContent();
}

function showAdminPanel(panel){
  document.querySelectorAll('.course-item[id^=nav-admin]').forEach(x=>x.classList.remove('active'));
  const navEl=document.getElementById('nav-admin-'+panel);
  if(navEl)navEl.classList.add('active');
  if(currentCourse){document.querySelectorAll('.course-item[id^=course-nav]').forEach(x=>x.classList.remove('active'));currentCourse=null;}
  if(panel==='users')renderAdminUsers();
  else if(panel==='dashboard')renderDashboard();
  else if(panel==='catalog')renderAdminCatalog();
  else if(panel==='categories')renderAdminCategories();
  else renderAdminCourses();
}

    return tutorCursos.some(cid=>
      (progress[u.id+'_'+cid])
    );
  });

function gerenciarCursosTutor(uid){
  const tutor = users.find(u=>u.id===uid);
  if(!tutor) return;
  const checkboxes = courses.map(c=>`
    <label style="display:flex;align-items:center;gap:.5rem;padding:.4rem 0;font-size:.85rem;cursor:pointer">
      <input type="checkbox" value="${c.id}" ${(tutor.cursos||[]).includes(c.id)?'checked':''}>
      ${c.icon||'📚'} ${c.name} <span style="font-size:.7rem;color:var(--muted)">(${c.tag})</span>
    </label>`).join('');
  document.getElementById('main-content').innerHTML =
    `<div class="course-header"><span class="course-tag">Admin</span><h1 class="course-title">🎓 Cursos de ${tutor.name}</h1></div>
    <div class="admin-section">
      <div class="admin-section-header">Vincular cursos ao tutor</div>
      <div class="admin-section-body">
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.8rem">Selecione os cursos pelos quais este professor é responsável:</p>
        <div id="tutor-cursos-check">${checkboxes||'<p style="color:var(--muted);font-size:.85rem">Nenhum curso cadastrado.</p>'}</div>
        <div style="display:flex;gap:.6rem;margin-top:1rem">
          <button class="btn-gold" onclick="salvarCursosTutor(${uid})">Salvar vínculos</button>
          <button class="btn-secondary" onclick="renderAdminUsers()">Cancelar</button>
        </div>
      </div>
    </div>`;
}

function salvarCursosTutor(uid){
  const checks = document.querySelectorAll('#tutor-cursos-check input[type=checkbox]');
  const selecionados = [];
  checks.forEach(c=>{ if(c.checked) selecionados.push(Number(c.value)); });
  users = users.map(u=> u.id===uid ? {...u, cursos:selecionados} : u);
  save();
  renderAdminUsers();
}

function addUser(){
  const name=document.getElementById('new-name').value.trim();
  const email=document.getElementById('new-email').value.trim();
  const pass=document.getElementById('new-pass').value.trim();
  const role=document.getElementById('new-role').value;
  if(!name||!email||!pass){alert('Preencha todos os campos.');return;}
  if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())){alert('E-mail já cadastrado.');return;}
  const novo={id:Date.now(),name,email,pass,role};
  if(role==='tutor') novo.cursos=[];
  users.push(novo);save();renderAdminUsers();
}
function removeUser(id){if(!confirm('Remover este usuário?'))return;users=users.filter(u=>u.id!==id);save();renderAdminUsers();}

function addCourse(){
  const name=document.getElementById('nc-name').value.trim();
  const tag=document.getElementById('nc-tag').value.trim()||'Geral';
  const icon=document.getElementById('nc-icon').value.trim()||'📚';
  const modules=document.getElementById('nc-modules').value.split('\n').map(m=>m.trim()).filter(Boolean);
  if(!name){alert('Informe o nome do curso.');return;}
  const mods=document.getElementById('nc-modules').value.split('\n').map(m=>{const t=m.trim();return t?{nome:t,dur:''}:null}).filter(Boolean);const acesso=document.getElementById('nc-acesso')?document.getElementById('nc-acesso').value:'interno';courses.push({id:Date.now(),name,tag,icon,acesso,resumo:document.getElementById('nc-resumo').value.trim(),duracao:document.getElementById('nc-duracao').value.trim(),modules:mods,materiais:[],pdfs:[],quiz:[],perguntas:[]});
  save();renderCourseList();renderAdminCourses();
}
function removeCourse(id){
  if(!confirm('Remover este curso?'))return;
  courses=courses.filter(c=>c.id!==id);
  if(currentCourse&&currentCourse.id===id)currentCourse=null;
  save();renderCourseList();renderAdminCourses();
}

function saveResumo(){

  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();renderCourse();setTab('resumo');
}

function renderModulos(){
  const c=currentCourse;
  const isAdmin=canEditContent(c.id);
  const mods=(c.modules||[]);
  const modList=mods.map((m,i)=>{
    const nome=typeof m==='string'?m:(m.nome||m);
    const dur=typeof m==='object'?m.dur||'':'';
    return `<div class="modulo-item">
      <div class="modulo-num">${i+1}</div>
      <div class="modulo-name">${nome}</div>
      ${dur?`<div class="modulo-dur">⏱ ${dur}</div>`:''}
      ${isAdmin?`<button class="btn-sm btn-danger-sm" onclick="removeModulo(${i})">✕</button>`:''}
    </div>`;
  }).join('');
  const adminForm=isAdmin?`
    <div class="admin-section" style="margin-top:1rem">
      <div class="admin-section-header">➕ Adicionar Módulo</div>
      <div class="admin-section-body">
        <div class="form-row">
          <div class="form-group"><label>Nome do módulo</label>
            <input type="text" id="mod-nome" placeholder="Ex: Introdução à Fé">
          </div>
          <div class="form-group" style="max-width:120px"><label>Duração</label>
            <input type="text" id="mod-dur" placeholder="30 min">
          </div>
        </div>
        <button class="btn-gold" onclick="addModulo()">Adicionar módulo</button>
      </div>
    </div>`:'';
  return `<div class="modulo-list">${modList||'<div class="pdf-no-files">Nenhum módulo cadastrado.</div>'}</div>`+adminForm;
}
function addModulo(){
  const nome=document.getElementById('mod-nome').value.trim();
  const dur=document.getElementById('mod-dur').value.trim();
  if(!nome){alert('Informe o nome do módulo.');return;}
  if(!currentCourse.modules) currentCourse.modules=[];
  currentCourse.modules.push({nome,dur});
  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();renderTabContent();
  document.getElementById('mod-nome').value='';
  document.getElementById('mod-dur').value='';
}
function removeModulo(i){
  if(!confirm('Remover este módulo?'))return;
  currentCourse.modules.splice(i,1);
  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();renderTabContent();
}

// ── PERGUNTAS ──
function renderPerguntas(){
  const c=currentCourse;
  const isAdmin=canEditContent(c.id)||isAdmin(currentUser);
  const pergs=(c.perguntas||[]);
  const pergCards=pergs.map((p,i)=>{
    const autorInicial=p.autor?p.autor.charAt(0).toUpperCase():'?';
    const respostaHtml=p.resposta
      ?`<div class="resposta-area">
          <div class="resposta-avatar">T</div>
          <div class="resposta-texto"><strong>Tutor:</strong> ${p.resposta}</div>
        </div>`
      :(isAdmin?`<div class="resposta-form">
          <div style="font-size:.75rem;font-weight:600;color:var(--navy);margin-bottom:.4rem">Responder como tutor:</div>
          <textarea id="resp-input-${i}" placeholder="Digite sua resposta..."></textarea>
          <div style="text-align:right;margin-top:.4rem">
            <button class="btn-gold" style="padding:.35rem .9rem;font-size:.78rem" onclick="responderPergunta(${i})">Responder</button>
          </div>
        </div>`
      :'<div class="resposta-area"><div class="resposta-texto" style="color:var(--muted);font-style:italic">Aguardando resposta do tutor...</div></div>');
    return `<div class="pergunta-card">
      <div class="pergunta-header">
        <div class="pergunta-avatar">${autorInicial}</div>
        <div class="pergunta-meta">
          <div class="pergunta-autor">${p.autor||'Aluno'}</div>
          <div class="pergunta-data">${p.data||''}</div>
        </div>
        <span class="badge-${p.resposta?'respondida':'pendente'}">${p.resposta?'Respondida':'Pendente'}</span>
      </div>
      <div class="pergunta-texto">${p.texto}</div>
      ${respostaHtml}
    </div>`;
  }).join('');

  const novaForm=`<div class="admin-section">
    <div class="admin-section-header">💬 ${isAdmin?'Nova Pergunta de Teste':'Fazer uma Pergunta'}</div>
    <div class="admin-section-body">
      <div class="form-group" style="margin-bottom:.7rem">
        <textarea id="nova-pergunta" placeholder="Digite sua dúvida sobre o conteúdo deste curso..." style="min-height:72px;width:100%;padding:.55rem .8rem;border:1.5px solid #dde;border-radius:8px;font-family:inherit;font-size:.85rem;resize:vertical"></textarea>
      </div>
      <button class="btn-gold" onclick="enviarPergunta()">Enviar pergunta</button>
    </div>
  </div>`;

  return `${pergs.length?'<div class="pergunta-list">'+pergCards+'</div>':'<div class="pdf-no-files" style="margin-bottom:1rem">Nenhuma pergunta ainda. Seja o primeiro a perguntar!</div>'}`+novaForm;
}

function enviarPergunta(){
  const texto=document.getElementById('nova-pergunta').value.trim();
  if(!texto){alert('Digite uma pergunta.');return;}
  if(!currentCourse.perguntas) currentCourse.perguntas=[];
  const now=new Date();
  const data=now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  currentCourse.perguntas.push({texto,autor:currentUser.name,data,resposta:''});
  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();renderTabContent();
}

function responderPergunta(i){
  const txt=document.getElementById('resp-input-'+i).value.trim();
  if(!txt){alert('Digite uma resposta.');return;}
  currentCourse.perguntas[i].resposta=txt;
  currentCourse.perguntas[i].respondidoPor=currentUser.name;
  courses=courses.map(c=>c.id===currentCourse.id?currentCourse:c);
  save();renderTabContent();
}

  document.getElementById('main-content').innerHTML=
    '<div class="course-header"><span class="course-tag">Admin</span><h1 class="course-title">📊 Dashboard</h1></div>'
    +'<div class="dash-grid">'
    +'<div class="dash-card highlight"><span class="dash-card-icon">✝️</span><div class="dash-card-value">'+nInternos+'</div><div class="dash-card-label">Alunos Internos</div></div>'
    +'<div class="dash-card" style="border-color:#c4b5fd"><span class="dash-card-icon">👤</span><div class="dash-card-value">'+nExternos+'</div><div class="dash-card-label">Alunos Externos</div></div>'
    +'<div class="dash-card" style="border-color:#fde68a"><span class="dash-card-icon">🎓</span><div class="dash-card-value">'+nTutores+'</div><div class="dash-card-label">Professores</div></div>'
    +'<div class="dash-card"><span class="dash-card-icon">📚</span><div class="dash-card-value">'+totalCourses+'</div><div class="dash-card-label">Cursos ativos</div></div>'
    +'<div class="dash-card"><span class="dash-card-icon">▶️</span><div class="dash-card-value">'+activeStudents+'</div><div class="dash-card-label">Com atividade</div></div>'
    +'<div class="dash-card"><span class="dash-card-icon">✅</span><div class="dash-card-value">'+completedCourses+'</div><div class="dash-card-label">Concluídos</div></div>'
    +'</div>'
    +'<div class="admin-section"><div class="admin-section-header">📋 Progresso por aluno</div>'
    +'<div class="admin-section-body" style="padding:0">'
    +'<table class="table-users"><thead><tr><th>Aluno</th><th>Perfil</th><th style="text-align:center">Iniciados</th><th style="text-align:center">Concluídos</th><th>Progresso</th></tr></thead>'
    +'<tbody>'+(alunoRows||'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1rem">Nenhum aluno com atividade ainda.</td></tr>')+'</tbody></table>'
    +'</div></div>'
    +'<div class="admin-section"><div class="admin-section-header">📚 Desempenho por curso</div>'
    +'<div class="admin-section-body" style="padding:0">'
    +'<table class="table-users"><thead><tr><th>Curso</th><th>Categoria</th><th>Tutor</th><th style="text-align:center">Iniciaram</th><th style="text-align:center">Concluíram</th></tr></thead>'
    +'<tbody>'+(courseRows||'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1rem">Sem cursos.</td></tr>')+'</tbody></table>'
    +'</div></div>';
}

// ─── CATÁLOGO (aluno) ───
function showCatalog(){
  currentCourse=null;
  document.querySelectorAll('.course-item').forEach(x=>x.classList.remove('active'));
  const nav=document.getElementById('nav-catalog');
  if(nav)nav.classList.add('active');
  renderCatalogView('');

function showCatalog(){
  currentCourse=null;
  document.querySelectorAll('.course-item').forEach(x=>x.classList.remove('active'));
  const nav=document.getElementById('nav-catalog');
  if(nav)nav.classList.add('active');
  renderCatalogView('');
}

function renderCatalogView(filterCat){
  if(!filterCat) filterCat = '';
  const courses_vis=cursosVisiveis();
  const allCats = ['', ...new Set(courses.map(c => c.tag))];
  const filterHtml = allCats.map(c =>
    '<button class="cat-filter ' + (filterCat === c ? 'active' : '') + '" onclick="renderCatalogView(\'' + c + '\')">' + (c === '' ? 'Todos' : c) + '</button>'
  ).join('');
  const filtered = filterCat ? courses.filter(c => c.tag === filterCat) : courses;
  const cardsHtml = filtered.map(c => {
    const pct = getCourseProgress(c.id);
    const pctLabel = pct === 0 ? 'Não iniciado' : pct === 100 ? '✓ Concluído' : pct + '% concluído';
    return '<div class="course-card" onclick="selectCourse(' + c.id + ')">'
      + '<div class="course-card-banner">' + (c.icon || '📚') + '</div>'
      + '<div class="course-card-body">'
      + '<div class="course-card-tag">' + c.tag + '</div>'
      + '<div class="course-card-name">' + c.name + '</div>'
      + '<div class="course-card-meta">'
      + '<span>📋 ' + c.modules.length + ' módulos</span>'
      + '<span>❓ ' + c.quiz.length + ' questões</span>'
      + '</div>'
      + '<div class="course-card-progress">'
      + '<div class="cc-bar"><div class="cc-bar-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="cc-pct">' + pctLabel + '</div>'
      + '</div>'
      + '</div></div>';
  }).join('');
  const noCoursesMsg = '<div style="text-align:center;padding:2rem;color:var(--muted)">Nenhum curso nesta categoria.</div>';
  document.getElementById('main-content').innerHTML =
    '<div class="course-header">'
    + '<span class="course-tag">Catálogo</span>'
    + '<h1 class="course-title">🗂️ Todos os Cursos</h1>'
    + '<div class="course-meta"><span>' + courses.length + ' curso(s) disponível(is)</span></div>'
    + '</div>'
    + '<div class="catalog-filters">' + filterHtml + '</div>'
    + (filtered.length ? '<div class="catalog-grid">' + cardsHtml + '</div>' : noCoursesMsg);
}

// ─── CATÁLOGO ADMIN ───
let adminCatalogFilter = '';

function renderAdminCatalog(filterCat){
  if(filterCat === undefined) filterCat = adminCatalogFilter;
  adminCatalogFilter = filterCat;
  const allCats = ['', ...new Set(courses.map(c => c.tag))];
  const filterHtml = allCats.map(c =>
    '<button class="cat-filter ' + (filterCat === c ? 'active' : '') + '" onclick="renderAdminCatalog(\'' + c + '\')">' + (c === '' ? 'Todos' : c) + '</button>'
  ).join('');
  const filtered = filterCat ? courses.filter(c => c.tag === filterCat) : courses;
  const cardsHtml = filtered.map(c => {
    const totalAlunos = users.filter(u => isAluno(u)).length;
    const started = users.filter(u => {
      const p = progress[u.id + '_' + c.id] || {};
      return p.materialDone || p.quizScore !== undefined;
    }).length;
    return '<div class="course-card">'
      + '<div class="course-card-banner">' + (c.icon || '📚') + '</div>'
      + '<div class="course-card-body">'
      + '<div class="course-card-tag">' + c.tag + ' &nbsp;<span style="font-size:.6rem;padding:.1rem .4rem;border-radius:3px;background:' + (c.acesso==='publico'?'#e8f4f6':'#f3f0ff') + ';color:var(--navy)">' + (c.acesso==='publico'?'🌐 Público':'✝️ Interno') + '</span></div>'
      + '<div class="course-card-name">' + c.name + '</div>'
      + '<div class="course-card-meta">'
      + '<span>📋 ' + c.modules.length + ' mód.</span>'
      + '<span>📄 ' + c.pdfs.length + ' PDF(s)</span>'
      + '<span>❓ ' + c.quiz.length + ' quest.</span>'
      + '</div>'
      + '<div class="course-card-progress">'
      + '<div class="cc-pct" style="color:var(--navy-light);font-weight:600">' + started + '/' + totalAlunos + ' alunos iniciaram</div>'
      + '</div>'
      + '<div style="display:flex;gap:.4rem;margin-top:.6rem">'
      + '<button class="btn-gold" style="flex:1;padding:.35rem;font-size:.72rem" onclick="event.stopPropagation();selectCourse(' + c.id + ')">Editar</button>'
      + '<button class="btn-sm btn-danger-sm" onclick="event.stopPropagation();removeCourse(' + c.id + ')">Remover</button>'
      + '</div>'
      + '</div></div>';
  }).join('');
  const noCoursesMsg = '<div style="text-align:center;padding:2rem;color:var(--muted)">Nenhum curso nesta categoria.</div>';
  document.getElementById('main-content').innerHTML =
    '<div class="course-header">'
    + '<span class="course-tag">Admin</span>'
    + '<h1 class="course-title">🗂️ Catálogo de Cursos</h1>'
    + '<div class="course-meta"><span>' + courses.length + ' curso(s)</span></div>'
    + '</div>'
    + '<div class="catalog-filters">' + filterHtml + '</div>'
    + (filtered.length ? '<div class="catalog-grid">' + cardsHtml + '</div>' : noCoursesMsg);
}

// ─── CATEGORIAS ADMIN ───
function renderAdminCategories(){
  const chipsHtml=categories.map((cat,i)=>`
    <div class="cat-chip">
      ${cat}
      <button onclick="removeCategory(${i})" title="Remover">✕</button>
    </div>`).join('');
  document.getElementById('main-content').innerHTML=`
    <div class="course-header">
      <span class="course-tag">Admin</span>
      <h1 class="course-title">🏷️ Categorias</h1>
    </div>
    <div class="admin-section">
      <div class="admin-section-header">Nova Categoria</div>
      <div class="admin-section-body">
        <div class="form-row">
          <div class="form-group">
            <label>Nome da categoria</label>
            <input type="text" id="new-cat-name" placeholder="Ex: Liderança" maxlength="30">
          </div>
        </div>
        <button class="btn-gold" onclick="addCategory()">Adicionar categoria</button>
      </div>
    </div>
    <div class="admin-section">
      <div class="admin-section-header">Categorias cadastradas (${categories.length})</div>
      <div class="admin-section-body">
        <div class="cat-list">${chipsHtml||'<span style="color:var(--muted);font-size:.85rem">Nenhuma categoria ainda.</span>'}</div>
      </div>
    </div>`;
}
function addCategory(){
  const name=document.getElementById('new-cat-name').value.trim();
  if(!name){alert('Informe um nome.');return;}
  if(categories.includes(name)){alert('Categoria já existe.');return;}
  categories.push(name);saveCategories();renderAdminCategories();
}
function removeCategory(i){
  if(!confirm('Remover esta categoria?'))return;
  categories.splice(i,1);saveCategories();renderAdminCategories();
}

</script>
